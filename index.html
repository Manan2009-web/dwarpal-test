<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store, max-age=0, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="color-scheme" content="light" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2872a1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DwarPal" />
    <meta name="description" content="Digital gatepass and campus access management system for students and faculty." />
    <link rel="icon" type="image/svg+xml" href="/dwarpal-icon-192.svg" />
    <link rel="apple-touch-icon" href="/dwarpal-icon-192.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>DwarPal - Digital Gatepass System</title>
  </head>
  <body>
    <div id="root">
      <div style="min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top left, rgba(47, 156, 98, 0.16), transparent 22rem), radial-gradient(circle at top right, rgba(53, 121, 214, 0.12), transparent 26rem), #f4f7f1;color:#163247;font-family:'Segoe UI','Trebuchet MS',Helvetica,Arial,sans-serif;">
        <div style="width:min(560px, 100%);border-radius:28px;padding:24px;background:rgba(255, 255, 255, 0.92);border:1px solid rgba(23, 52, 73, 0.14);box-shadow:0 24px 70px rgba(20, 38, 27, 0.12);">
          <p style="margin:0;font-size:0.82rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#5d7183;">DwarPal</p>
          <h1 style="margin:0.45rem 0 0.75rem;font-size:1.6rem;">Loading workspace...</h1>
          <p style="margin:0;line-height:1.6;color:#5d7183;">Starting the DwarPal app shell.</p>
        </div>
      </div>
    </div>
    <script>
      ;(() => {
        const root = document.getElementById('root')

        if (!root) {
          return
        }

        function escapeHtml(value) {
          return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;')
        }

        function renderStatusScreen({ title, message, details = '', showReload = false }) {
          const safeTitle = escapeHtml(title)
          const safeMessage = escapeHtml(message)
          const safeDetails = escapeHtml(details)

          root.innerHTML = `
            <div style="min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top left, rgba(47, 156, 98, 0.16), transparent 22rem), radial-gradient(circle at top right, rgba(53, 121, 214, 0.12), transparent 26rem), #f4f7f1;color:#163247;font-family:'Segoe UI','Trebuchet MS',Helvetica,Arial,sans-serif;">
              <div style="width:min(560px, 100%);border-radius:28px;padding:24px;background:rgba(255, 255, 255, 0.92);border:1px solid rgba(23, 52, 73, 0.14);box-shadow:0 24px 70px rgba(20, 38, 27, 0.12);">
                <p style="margin:0;font-size:0.82rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#5d7183;">DwarPal</p>
                <h1 style="margin:0.45rem 0 0.75rem;font-size:1.6rem;">${safeTitle}</h1>
                <p style="margin:0;line-height:1.6;color:#5d7183;">${safeMessage}</p>
                ${
                  details
                    ? `<pre style="margin:1rem 0 0;padding:0.9rem 1rem;border-radius:16px;overflow:auto;background:rgba(22, 50, 71, 0.06);color:#163247;font:500 0.84rem/1.5 'Consolas','SFMono-Regular',monospace;white-space:pre-wrap;">${safeDetails}</pre>`
                    : ''
                }
                ${
                  showReload
                    ? '<button id="dwarpal-reload-app" type="button" style="margin-top:1.25rem;border:0;border-radius:16px;padding:0.95rem 1.2rem;background:linear-gradient(135deg, #2872a1, #1f5a80);color:#ffffff;font-weight:700;">Reload App</button>'
                    : ''
                }
              </div>
            </div>
          `

          if (showReload) {
            document.getElementById('dwarpal-reload-app')?.addEventListener('click', () => {
              window.location.reload()
            })
          }
        }

        function cleanupLegacyBrowserState() {
          const cleanupTasks = []

          if ('serviceWorker' in navigator) {
            cleanupTasks.push(
              navigator.serviceWorker
                .getRegistrations()
                .then((registrations) => {
                  const stale = registrations.filter((r) => {
                    const url = r.active?.scriptURL || r.waiting?.scriptURL || r.installing?.scriptURL || '';
                    return !url.includes('firebase-messaging-sw.js') && !url.includes('/sw.js');
                  });
                  return Promise.allSettled(stale.map((r) => r.unregister()));
                }),
            )
          }

          if ('caches' in window) {
            cleanupTasks.push(
              window.caches
                .keys()
                .then((cacheKeys) => {
                  const stale = cacheKeys.filter((key) => key.startsWith('dwarpal-legacy-'))
                  return Promise.allSettled(stale.map((key) => window.caches.delete(key)))
                }),
            )
          }

          Promise.allSettled(cleanupTasks).catch(() => {
            // Ignore cleanup failures so startup never blocks.
          })
        }

        function shouldShowBootError(message, resourceUrl = '') {
          return /failed to fetch|module script|dynamically imported module|unexpected token|cannot find module|err_blocked_by_client|blocked_by_client/i.test(
            `${String(message || '')} ${String(resourceUrl || '')}`,
          )
        }

        let started = false
        cleanupLegacyBrowserState()

        window.__DWARPAL_BOOT_STATUS__ = {
          markStarted() {
            started = true
          },
          showError(message) {
            if (started) {
              return
            }

            renderStatusScreen({
              title: 'The app hit a startup error.',
              message: 'A fallback screen is showing so the app does not fail silently. Reload after the cache or blocked module issue is cleared.',
              details: message,
              showReload: true,
            })
          },
        }

        window.addEventListener('error', (event) => {
          const message =
            typeof event?.message === 'string' && event.message.trim()
              ? event.message
              : typeof event?.error?.message === 'string'
                ? event.error.message
                : ''
          const resourceUrl =
            typeof event?.filename === 'string' && event.filename.trim()
              ? event.filename
              : typeof event?.target?.src === 'string' && event.target.src.trim()
                ? event.target.src
                : typeof event?.target?.href === 'string' && event.target.href.trim()
                  ? event.target.href
                  : ''

          if (!started && shouldShowBootError(message, resourceUrl)) {
            window.__DWARPAL_BOOT_STATUS__.showError(
              message || `A startup resource was blocked or missing: ${resourceUrl || 'unknown resource'}`,
            )
          }
        })

        window.addEventListener('unhandledrejection', (event) => {
          const reason = event?.reason
          const message =
            typeof reason === 'string'
              ? reason
              : typeof reason?.message === 'string'
                ? reason.message
                : ''

          if (!started && shouldShowBootError(message)) {
            window.__DWARPAL_BOOT_STATUS__.showError(message)
          }
        })
      })()
    </script>
    <script type="module" src="/src/main.jsx"></script>
    <noscript>
      <div style="padding:24px;font-family:'Segoe UI',sans-serif;color:#163247;">
        DwarPal needs JavaScript enabled to load the app.
      </div>
    </noscript>
  </body>
</html>
